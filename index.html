<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cara a Cara – Sortear Personagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0d1a;
      --panel:   #16162a;
      --card:    #1e1e36;
      --accent1: #f7c948;
      --accent2: #ff5e7e;
      --accent3: #4de8c2;
      --text:    #f0eefc;
      --muted:   #7b79a8;
      --radius:  20px;
      --shadow:  0 8px 40px rgba(0,0,0,.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* stars bg */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(circle, #fff 1px, transparent 1px),
        radial-gradient(circle, #fff 1px, transparent 1px);
      background-size: 120px 120px, 80px 80px;
      background-position: 0 0, 40px 40px;
      opacity: .04;
      pointer-events: none;
    }

    header {
      position: relative; z-index: 1;
      width: 100%;
      text-align: center;
      padding: 24px 16px 6px;
    }
    header h1 {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2rem, 10vw, 3.2rem);
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent1) 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    header p {
      color: var(--muted);
      font-size: .85rem;
      margin-top: 3px;
    }

    main {
      position: relative; z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* ── slot machine ── */
    .slot-window {
      width: 100%;
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid rgba(247,201,72,.18);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      transition: box-shadow .3s, border-color .3s;
    }
    .slot-window.spinning {
      box-shadow: var(--shadow), 0 0 28px 6px rgba(247,201,72,.35);
    }
    .slot-window.winner {
      box-shadow: var(--shadow), 0 0 44px 12px rgba(77,232,194,.5);
      border-color: var(--accent3);
    }

    /* fade edges */
    .slot-window::before,
    .slot-window::after {
      content: '';
      position: absolute; left: 0; right: 0; z-index: 2;
      height: 70px;
      pointer-events: none;
    }
    .slot-window::before { top: 0;    background: linear-gradient(to bottom, var(--card), transparent); }
    .slot-window::after  { bottom: 0; background: linear-gradient(to top,    var(--card), transparent); }

    /* highlight bar in center while spinning */
    .center-line {
      position: absolute;
      left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent1), transparent);
      z-index: 3;
      opacity: 0;
      transition: opacity .3s;
    }
    .slot-window.spinning .center-line { opacity: 1; }

    /* winner name label that appears on the slot itself */
    .winner-label {
      position: absolute;
      bottom: 12px; left: 0; right: 0;
      z-index: 4;
      text-align: center;
      font-family: 'Boogaloo', cursive;
      font-size: 1.5rem;
      color: var(--accent3);
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .4s ease, transform .4s ease;
      pointer-events: none;
    }
    .slot-window.winner .winner-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* reel */
    .reel {
      height: 300px;
      overflow: hidden;
      position: relative;
    }
    .reel-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .reel-card {
      width: 100%;
      padding: 10px 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .reel-card img {
      width: 150px; height: 150px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,.08);
      background: var(--panel);
    }
    .reel-card .card-name {
      font-family: 'Boogaloo', cursive;
      font-size: 1.25rem;
      color: var(--text);
      letter-spacing: 1px;
    }

    /* confetti */
    .confetti-container {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      opacity: 0;
      animation: confettiFall 1.2s ease forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* button */
    .btn-sorteio {
      width: 100%;
      max-width: 320px;
      padding: 17px 0;
      font-family: 'Boogaloo', cursive;
      font-size: 1.45rem;
      letter-spacing: 2px;
      color: #0d0d1a;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(247,201,72,.4);
      transition: transform .15s, box-shadow .15s, opacity .2s;
      position: relative;
      overflow: hidden;
    }
    .btn-sorteio:not(:disabled):active {
      transform: scale(.96);
      box-shadow: 0 3px 12px rgba(247,201,72,.3);
    }
    .btn-sorteio:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sorteio::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform: translateX(-100%);
      transition: transform .4s;
    }
    .btn-sorteio:not(:disabled):hover::after { transform: translateX(100%); }
  </style>
</head>
<body>

<header>
  <h1>🎭 Cara a Cara</h1>
  <p>Sorteie um personagem e descubra quem é!</p>
</header>

<main>
  <div class="slot-window" id="slotWindow">
    <div class="center-line"></div>
    <div class="reel" id="reel">
      <div class="reel-inner" id="reelInner"></div>
    </div>
    <div class="winner-label" id="winnerLabel"></div>
  </div>

  <div class="confetti-container" id="confetti"></div>

  <button class="btn-sorteio" id="btnSortear" onclick="iniciarSorteio()">
    🎰 Sortear Personagem
  </button>
</main>

<script>
  const personagens = [
    { nome: "Erick",     imagem: "img/1erick.png" },
    { nome: "Laura",     imagem: "img/2laura.png" },
    { nome: "Gabriel",   imagem: "img/3gabriel.png" },
    { nome: "Rebeka",    imagem: "img/4rebeka.png" },
    { nome: "Carlos",    imagem: "img/5carlos.png" },
    { nome: "Gabrielle", imagem: "img/6gabriele.png" },
    { nome: "Larissa",   imagem: "img/7larissa.png" },
    { nome: "Estevão",   imagem: "img/8estevão.png" },
    { nome: "Leandro",   imagem: "img/9leandro.png" },
    { nome: "Andresa",   imagem: "img/10andresa.png" },
    { nome: "João",      imagem: "img/11joão.png" },
    { nome: "Verônica",  imagem: "img/12veronica.png" },
    { nome: "Arthur",    imagem: "img/13arthur.png" },
    { nome: "Elisa",     imagem: "img/14elisa.png" },
    { nome: "Gustavo",   imagem: "img/15gustavo.png" },
    { nome: "Raquel",    imagem: "img/16raquel.png" },
    { nome: "Jessé",     imagem: "img/17jessé.png" },
    { nome: "Liciana",   imagem: "img/18liciane.png" },
    { nome: "Adrielle",  imagem: "img/19adrielle.png" },
    { nome: "Gislei",    imagem: "img/20gislei.png" },
    { nome: "Giovana",   imagem: "img/21giovana.png" },
    { nome: "Barneh",    imagem: "img/22baerneh.png" },
    { nome: "Leonardo",  imagem: "img/23leo.png" },
    { nome: "Junia",     imagem: "img/24junia.png" },
  ];

  // card height = img(150) + gap(6) + name(~24) + padding(18) = ~198px
  const CARD_H    = 198;
  const reelInner = document.getElementById('reelInner');
  const reel      = document.getElementById('reel');
  const slotWin   = document.getElementById('slotWindow');
  const winLabel  = document.getElementById('winnerLabel');
  const btnSortear= document.getElementById('btnSortear');
  const confettiEl= document.getElementById('confetti');

  function buildStrip() {
    reelInner.innerHTML = '';
    const strip = [];
    for (let i = 0; i < 5; i++) {
      [...personagens].sort(() => Math.random() - .5).forEach(p => strip.push(p));
    }
    strip.forEach(p => {
      const card = document.createElement('div');
      card.className = 'reel-card';
      card.innerHTML = `<img src="${p.imagem}" alt="${p.nome}" loading="lazy" /><span class="card-name">${p.nome}</span>`;
      reelInner.appendChild(card);
    });
    return strip;
  }

  function iniciarSorteio() {
    btnSortear.disabled = true;
    slotWin.classList.remove('winner');
    slotWin.classList.add('spinning');
    winLabel.textContent = '';
    confettiEl.innerHTML = '';

    const strip      = buildStrip();
    const winnerIdx  = Math.floor(Math.random() * personagens.length);
    const winnerP    = personagens[winnerIdx];

    // land on this character in the 4th copy of the strip
    const landingPos = personagens.length * 3 + winnerIdx;
    const reelCenter = reel.clientHeight / 2;
    const targetY    = landingPos * CARD_H - reelCenter + CARD_H / 2;

    reelInner.style.transition = 'none';
    reelInner.style.transform  = 'translateY(0)';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const duration = 2400;
      reelInner.style.transition = `transform ${duration}ms cubic-bezier(0.16, 1, 0.3, 1)`;
      reelInner.style.transform  = `translateY(-${targetY}px)`;

      setTimeout(() => {
        slotWin.classList.remove('spinning');
        slotWin.classList.add('winner');
        winLabel.textContent = winnerP.nome;
        spawnConfetti();
        btnSortear.disabled = false;
        btnSortear.textContent = '🎰 Sortear Novamente';
      }, duration + 80);
    }));
  }

  const COLORS = ['#f7c948','#ff5e7e','#4de8c2','#a78bfa','#fb923c','#60a5fa'];
  function spawnConfetti() {
    for (let i = 0; i < 65; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 6 + Math.random() * 9;
      p.style.cssText = `
        left:${Math.random()*100}%;top:-12px;
        background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
        width:${size}px;height:${size}px;
        border-radius:${Math.random()>.5?'50%':'3px'};
        animation-delay:${Math.random()*.7}s;
        animation-duration:${.9+Math.random()*.7}s;`;
      confettiEl.appendChild(p);
    }
    setTimeout(() => confettiEl.innerHTML = '', 2200);
  }
</script>
</body>
</html>
